<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理健康评估问卷</title>
<style>
  :root {
    --bg:#f5f6f8; --card-bg:#fff; --text:#2c3e50; --text-secondary:#7f8c8d;
    --accent:#3498db; --accent-hover:#2980b9; --border:#e0e4e8;
    --progress-bg:#e8ecf0; --progress-fill:#3498db;
    --option-bg:#fafbfc; --option-hover:#eef4fb; --option-selected:#e3f0fc;
    --option-selected-border:#3498db; --danger:#e74c3c;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --transition-speed:0.8s;
    --body-font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    --vignette-opacity:0; --grain-opacity:0; --breath-speed:12s;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--body-font); background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    transition:background var(--transition-speed),color var(--transition-speed);
    user-select:none; -webkit-user-select:none; overflow-x:hidden;
  }
  /* ---- Overlays ---- */
  .vignette{
    position:fixed; top:0;left:0;right:0;bottom:0; z-index:1; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,var(--vignette-opacity)) 100%);
    transition:all var(--transition-speed);
  }
  .grain{
    position:fixed; top:-50%;left:-50%;right:-50%;bottom:-50%; z-index:2; pointer-events:none;
    opacity:var(--grain-opacity); transition:opacity var(--transition-speed);
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size:256px 256px;
  }
  .scanlines{
    position:fixed; top:0;left:0;right:0;bottom:0; z-index:3; pointer-events:none;
    background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    opacity:0; transition:opacity var(--transition-speed);
  }
  .scanlines.on{opacity:1;}
  .blood-drip{
    position:fixed; top:0;left:0;right:0; z-index:4; pointer-events:none; height:0;
    background:linear-gradient(180deg, transparent 0%, rgba(139,0,0,0.15) 100%);
    transition:height 3s ease-in; overflow:hidden;
  }
  .blood-drip.active{height:120px;}
  .container{width:100%;max-width:660px;padding:24px;position:relative;z-index:10;}
  .card{
    background:var(--card-bg); border-radius:16px; padding:44px 40px;
    box-shadow:var(--shadow); transition:all var(--transition-speed);
    position:relative; overflow:hidden; border:1px solid var(--border);
    animation:breathing var(--breath-speed) ease-in-out infinite;
  }
  @keyframes breathing{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.002);}
  }
  /* ---- Header ---- */
  .header{text-align:center;margin-bottom:32px;position:relative;z-index:2;}
  .header .logo{font-size:12px;color:var(--text-secondary);letter-spacing:3px;margin-bottom:8px;transition:color var(--transition-speed);}
  .header h1{font-size:22px;font-weight:600;letter-spacing:1px;margin-bottom:6px;transition:color var(--transition-speed);}
  .header .subtitle{font-size:12px;color:var(--text-secondary);transition:color var(--transition-speed);}
  .header .audio-indicator{font-size:10px;color:var(--text-secondary);margin-top:10px;opacity:0.5;transition:opacity 0.5s;}
  /* ---- Progress ---- */
  .progress-wrap{margin-bottom:28px;position:relative;z-index:2;}
  .progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:6px;transition:color var(--transition-speed);}
  .progress-bar{height:4px;background:var(--progress-bg);border-radius:2px;overflow:hidden;transition:background var(--transition-speed);}
  .progress-fill{height:100%;background:var(--progress-fill);border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1),background var(--transition-speed);}
  /* ---- Question ---- */
  .question-area{min-height:200px;transition:opacity 0.3s,transform 0.3s;position:relative;z-index:2;}
  .question-area.trans{opacity:0;transform:translateY(10px);}
  .q-number{font-size:11px;color:var(--accent);letter-spacing:1px;margin-bottom:12px;transition:color var(--transition-speed);}
  .q-title{font-size:18px;font-weight:500;line-height:1.8;margin-bottom:24px;transition:color var(--transition-speed);}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option{
    display:flex;align-items:center;padding:14px 18px;background:var(--option-bg);
    border:1.5px solid var(--border);border-radius:10px;cursor:pointer;
    transition:all 0.25s;font-size:15px;position:relative;
  }
  .option:hover{background:var(--option-hover);border-color:var(--accent);}
  .option.sel{background:var(--option-selected);border-color:var(--option-selected-border);}
  .option .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);margin-right:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;}
  .option.sel .radio{border-color:var(--accent);background:var(--accent);}
  .option.sel .radio::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;}
  /* ---- Nav ---- */
  .nav{display:flex;justify-content:space-between;margin-top:32px;gap:12px;position:relative;z-index:2;}
  .btn{padding:10px 28px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.25s;font-family:var(--body-font);letter-spacing:0.5px;}
  .btn-prev{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}
  .btn-prev:hover{background:var(--option-bg);}
  .btn-next{background:var(--accent);color:#fff;margin-left:auto;}
  .btn-next:hover{background:var(--accent-hover);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  /* ---- Input ---- */
  .text-input{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:var(--body-font);background:var(--option-bg);color:var(--text);transition:all 0.25s;outline:none;}
  .text-input:focus{border-color:var(--accent);background:var(--option-selected);}
  .special-notice{background:var(--option-bg);border:1px solid var(--border);border-radius:10px;padding:18px;font-size:14px;line-height:1.8;color:var(--text-secondary);transition:all var(--transition-speed);}
  /* ---- Hidden text ---- */
  .hidden-msg{color:transparent;transition:color 0.3s;user-select:all;-webkit-user-select:all;}
  .hidden-msg::selection{color:var(--danger);background:rgba(231,76,60,0.08);}
  .hidden-msg::-moz-selection{color:var(--danger);background:rgba(231,76,60,0.08);}
  /* ---- Animations ---- */
  @keyframes glitch{
    0%,100%{transform:translate(0);}
    15%{transform:translate(-4px,2px);text-shadow:-2px 0 #f00,2px 0 #00f;}
    30%{transform:translate(4px,-1px);text-shadow:2px 0 #f00,-2px 0 #00f;}
    45%{transform:translate(-2px,-2px);}
    60%{transform:translate(3px,1px);text-shadow:-1px 0 #f00,1px 0 #00f;}
    75%{transform:translate(-1px,2px);}
    90%{transform:translate(2px,-1px);text-shadow:1px 0 #f00,-1px 0 #00f;}
  }
  @keyframes flicker{
    0%,100%{opacity:1;} 41%{opacity:1;} 42%{opacity:0.2;} 43%{opacity:1;}
    45%{opacity:0.5;} 46%{opacity:1;} 72%{opacity:1;} 73%{opacity:0.15;} 74%{opacity:1;}
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);} 10%{transform:translateX(-5px);}
    30%{transform:translateX(5px);} 50%{transform:translateX(-3px);}
    70%{transform:translateX(3px);} 90%{transform:translateX(-1px);}
  }
  @keyframes pulse-red{
    0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.5);}
    50%{box-shadow:0 0 0 16px rgba(192,57,43,0);}
  }
  @keyframes textFade{0%,100%{opacity:0.7;} 50%{opacity:0.15;}}
  @keyframes bloodDrop{
    0%{transform:translateY(-100px);opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{transform:translateY(100vh);opacity:0;}
  }
  .glitch-text{animation:glitch 0.35s ease;}
  .shake-card{animation:shake 0.5s ease;}
  /* ---- Result ---- */
  .result-wrap{text-align:center;padding:20px 0;}
  .result-wrap .icon{font-size:48px;margin-bottom:8px;}
  /* ---- Responsive ---- */
  @media(max-width:480px){
    .card{padding:28px 20px;border-radius:12px;}
    .header h1{font-size:19px;} .q-title{font-size:16px;}
    .option{padding:12px 14px;font-size:14px;}
    .btn{padding:10px 20px;font-size:13px;}
  }
</style>
</head>
<body>

<div class="vignette" id="vignette"></div>
<div class="grain" id="grain"></div>
<div class="scanlines" id="scanlines"></div>
<div class="blood-drip" id="bloodDrip"></div>

<div class="container">
  <div class="card" id="card">
    <div class="header">
      <div class="logo" id="logoText">心理评估中心</div>
      <h1 id="headerTitle">心理健康评估问卷</h1>
      <div class="subtitle" id="subtitle">请根据您的实际情况如实作答</div>
      <div class="audio-indicator" id="audioIndicator">🔇 点击任意位置开启音效体验</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progressLabel">第 <span id="currentQ">1</span> 题 / 共 <span id="totalQ">24</span> 题</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-area" id="questionArea"></div>
    <div class="nav">
      <button class="btn btn-prev" id="btnPrev" disabled>上一题</button>
      <button class="btn btn-next" id="btnNext" disabled>下一题</button>
    </div>
  </div>
</div>

<script>
(function(){
const T=24;
let idx=0, answers={}, gp=1, gcount=0, audioInitialized=false;
let hoverCounts={};

// ===================== HORROR AUDIO ENGINE v2 =====================
const Audio = {
  ctx:null, master:null, droneGain:null, noiseGain:null, heartbeatGain:null,
  shepardGain:null, tinnitusGain:null, impactGain:null, noiseFilter:null,
  padGain:null, screamGain:null, lfoOsc:null, phase:0, shepardActive:false, hbTimer:null, init:false,
  droneOscs:[], padOscs:[], lastPhase:0,

  async start(){
    if(this.init)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Master gain — much louder
    this.master=this.ctx.createGain(); this.master.gain.value=0.85; this.master.connect(this.ctx.destination);

    // === DRONE LAYER: 9 oscillators forming unsettled tone-clusters ===
    this.droneGain=this.ctx.createGain(); this.droneGain.gain.value=0;
    const droneFilter=this.ctx.createBiquadFilter(); droneFilter.type='lowpass'; droneFilter.frequency.value=120;
    this.droneGain.connect(droneFilter); droneFilter.connect(this.master);
    // Microtonal cluster: fundamental + detuned copies + tritone + minor 2nd
    [28,28.5,42,43.5,56,57,68,71,85].forEach((f,i)=>{
      const o=this.ctx.createOscillator();
      o.type=i<3?'sine':'triangle';
      o.frequency.value=f;
      o.connect(this.droneGain); o.start();
      this.droneOscs.push(o);
    });

    // === PAD LAYER: "string section" simulation (phase 3+) ===
    this.padGain=this.ctx.createGain(); this.padGain.gain.value=0;
    const padFilter=this.ctx.createBiquadFilter(); padFilter.type='lowpass'; padFilter.frequency.value=600;
    this.padGain.connect(padFilter); padFilter.connect(this.master);
    // Dissonant intervals for horror string effect
    [110,116.5,146.8,156,220,233,277].forEach((f,i)=>{
      const o=this.ctx.createOscillator();
      o.type='sawtooth';
      o.frequency.value=f;
      const g=this.ctx.createGain(); g.gain.value=0.04;
      o.connect(g); g.connect(this.padGain); o.start();
      this.padOscs.push({osc:o,gain:g});
      // Slow individual LFO modulation for "string section" movement
      const lfo=this.ctx.createOscillator();
      lfo.type='sine'; lfo.frequency.value=0.08+Math.random()*0.15;
      const lfoG=this.ctx.createGain(); lfoG.gain.value=1.5+Math.random()*3;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      lfo.start();
    });

    // === NOISE LAYER: filtered wind/breath ===
    this.noiseGain=this.ctx.createGain(); this.noiseGain.gain.value=0;
    this.noiseFilter=this.ctx.createBiquadFilter(); this.noiseFilter.type='bandpass'; this.noiseFilter.frequency.value=380; this.noiseFilter.Q.value=0.35;
    this.noiseGain.connect(this.noiseFilter); this.noiseFilter.connect(this.master);
    const bs=this.ctx.sampleRate*4, buf=this.ctx.createBuffer(1,bs,this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*0.7;
    const ns=this.ctx.createBufferSource(); ns.buffer=buf; ns.loop=true; ns.connect(this.noiseGain); ns.start();

    // === TINNITUS: high freq ===
    this.tinnitusGain=this.ctx.createGain(); this.tinnitusGain.gain.value=0;
    const tinOsc=this.ctx.createOscillator(); tinOsc.type='sine'; tinOsc.frequency.value=8600; tinOsc.connect(this.tinnitusGain); this.tinnitusGain.connect(this.master); tinOsc.start();

    // === IMPACT channel for low-end thuds ===
    this.impactGain=this.ctx.createGain(); this.impactGain.gain.value=0;
    const impFilter=this.ctx.createBiquadFilter(); impFilter.type='lowpass'; impFilter.frequency.value=80;
    this.impactGain.connect(impFilter); impFilter.connect(this.master);

    // === GLOBAL LFO for slow "breathing" modulation on drone ===
    this.lfoOsc=this.ctx.createOscillator(); this.lfoOsc.type='sine'; this.lfoOsc.frequency.value=0.05;
    const lfoG=this.ctx.createGain(); lfoG.gain.value=0.5;
    this.lfoOsc.connect(lfoG); lfoG.connect(this.droneGain.gain);
    this.lfoOsc.start();

    this.init=true; this._heartbeat();
  },

  _heartbeat(){
    const bpm=this.phase>=4?115:this.phase>=3?78:this.phase>=2?52:0;
    if(bpm===0){this.hbTimer=setTimeout(()=>this._heartbeat(),2000);return;}
    const t=this.ctx.currentTime, dur=0.22;
    // Double thump for more realistic heartbeat
    [0,0.15].forEach(delay=>{
      const env=this.ctx.createGain(), osc=this.ctx.createOscillator();
      osc.type='sine'; osc.frequency.value=30;
      env.gain.setValueAtTime(0,t+delay);
      env.gain.linearRampToValueAtTime(0.7,t+delay+0.03);
      env.gain.exponentialRampToValueAtTime(0.001,t+delay+dur);
      osc.connect(env); env.connect(this.ctx.destination);
      osc.start(t+delay); osc.stop(t+delay+dur);
    });
    this.hbTimer=setTimeout(()=>this._heartbeat(),60000/bpm);
  },

  _shepard(){
    if(this.shepardActive)return;
    this.shepardActive=true;
    this.shepardGain=this.ctx.createGain(); this.shepardGain.gain.value=0;
    const sf=this.ctx.createBiquadFilter(); sf.type='lowpass'; sf.frequency.value=1500;
    this.shepardGain.connect(sf); sf.connect(this.master);
    const loop=()=>{
      if(!this.shepardActive)return;
      const now=this.ctx.currentTime, dur=10;
      const base=35;
      [0.25,0.5,1,2,4,8,16,32].forEach((m,i)=>{
        const o=this.ctx.createOscillator(); o.type=i%2?'sine':'triangle';
        o.frequency.setValueAtTime(base*m,now);
        o.frequency.linearRampToValueAtTime(base*m*2.2,now+dur);
        const env=this.ctx.createGain();
        const c=4, amp=Math.exp(-Math.pow(i-c,2)/3)*0.1;
        env.gain.setValueAtTime(amp,now);
        env.gain.setValueAtTime(amp,now+dur*0.9);
        env.gain.linearRampToValueAtTime(0.001,now+dur);
        o.connect(env); env.connect(this.shepardGain);
        o.start(now); o.stop(now+dur);
      });
      setTimeout(loop,dur*920);
    };
    loop();
  },

  setPhase(p){
    if(!this.init)return;
    if(p===this.phase)return;
    this.lastPhase=this.phase; this.phase=p;
    const t=this.ctx.currentTime, s=2.5;
    // Much higher gain levels
    const l={
      1:{d:0.04,n:0.012, h:0,   t:0,     p:0,    i:false},
      2:{d:0.10,n:0.04,  h:0.04,t:0,     p:0,    i:false},
      3:{d:0.18,n:0.08,  h:0.10,t:0.015, p:0.12, i:true},
      4:{d:0.28,n:0.14,  h:0.20,t:0.030, p:0.25, i:true},
    }[p]||l[1];
    this.droneGain.gain.linearRampToValueAtTime(l.d,t+s);
    this.noiseGain.gain.linearRampToValueAtTime(l.n,t+s);
    this.tinnitusGain.gain.linearRampToValueAtTime(l.t,t+s);
    this.padGain.gain.linearRampToValueAtTime(l.p,t+s);
    if(l.i && !this.shepardActive)this._shepard();
    if(this.shepardGain)this.shepardGain.gain.linearRampToValueAtTime(l.i?0.12:0,t+s);
    this._heartbeat();
    if(this.noiseFilter)this.noiseFilter.frequency.linearRampToValueAtTime(p>=4?140:p>=3?250:380,t+s);
  },

  // ======== JUMP SCARE SYSTEM ========
  jumpscare(type,intensity){
    if(!this.init)return;
    const t=this.ctx.currentTime, I=Math.min(3,intensity||1);
    const vol=I/3; // 0.33, 0.67, 1.0

    // Helper: create osc with envelope
    const oscEnv=(freq,wave,attack,decay,volMul,filterFreq,filterQ)=>{
      const o=this.ctx.createOscillator(); o.type=wave; o.frequency.value=freq;
      const env=this.ctx.createGain(), flt=this.ctx.createBiquadFilter();
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(0.9*volMul*vol,t+attack);
      env.gain.exponentialRampToValueAtTime(0.001,t+attack+decay);
      flt.type='lowpass'; flt.frequency.value=filterFreq; flt.Q.value=filterQ;
      o.connect(flt); flt.connect(env); env.connect(this.master);
      o.start(t); o.stop(t+attack+decay+0.1);
    };

    if(type==='stinger'||type==='all'){
      // Dissonant orchestral hit: multiple detuned sawtooths
      [55,58,62,69,74,82,92,110,138].forEach(f=>{
        oscEnv(f,'sawtooth',0.02,0.8+Math.random()*0.6,1.0,400+I*200,1.5);
      });
      // High screech layer
      oscEnv(1800,'sawtooth',0.03,0.35,0.5,2500,3);
      oscEnv(2400,'square',0.03,0.3,0.4,3000,4);
      // Noise burst
      const nBuf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.5,this.ctx.sampleRate);
      const nd=nBuf.getChannelData(0);
      for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.06));
      const nSrc=this.ctx.createBufferSource(); nSrc.buffer=nBuf;
      const nEnv=this.ctx.createGain(); nEnv.gain.setValueAtTime(0.5*vol,t); nEnv.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      nSrc.connect(nEnv); nEnv.connect(this.master); nSrc.start(t); nSrc.stop(t+0.5);
    }

    if(type==='subdrop'||type==='all'){
      // Sub-bass drop
      const sub=this.ctx.createOscillator(); sub.type='sine';
      sub.frequency.setValueAtTime(65,t);
      sub.frequency.exponentialRampToValueAtTime(18,t+0.7);
      const subEnv=this.ctx.createGain();
      subEnv.gain.setValueAtTime(0,t); subEnv.gain.linearRampToValueAtTime(0.95*vol,t+0.02);
      subEnv.gain.exponentialRampToValueAtTime(0.001,t+0.8);
      sub.connect(subEnv); subEnv.connect(this.master);
      sub.start(t); sub.stop(t+0.9);
      // Sub rumble noise
      const rBuf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.6,this.ctx.sampleRate);
      const rd=rBuf.getChannelData(0);
      for(let i=0;i<rd.length;i++)rd[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*0.15));
      const rSrc=this.ctx.createBufferSource(); rSrc.buffer=rBuf;
      const rEnv=this.ctx.createGain(); const rFlt=this.ctx.createBiquadFilter();
      rFlt.type='lowpass'; rFlt.frequency.value=70;
      rEnv.gain.setValueAtTime(0.6*vol,t); rEnv.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      rSrc.connect(rFlt); rFlt.connect(rEnv); rEnv.connect(this.master);
      rSrc.start(t); rSrc.stop(t+0.6);
    }

    if(type==='scream'||type==='all'){
      // High-pitched violin-like scream
      [2000,2400,3000].forEach((f,i)=>{
        const o=this.ctx.createOscillator(); o.type='sawtooth';
        o.frequency.setValueAtTime(f,t);
        o.frequency.linearRampToValueAtTime(f*(1.5+i*0.3),t+0.15);
        o.frequency.exponentialRampToValueAtTime(400,t+0.5);
        const env=this.ctx.createGain(), flt=this.ctx.createBiquadFilter();
        flt.type='bandpass'; flt.frequency.value=f; flt.Q.value=5;
        env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.35*vol,t+0.04);
        env.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.connect(flt); flt.connect(env); env.connect(this.master);
        o.start(t); o.stop(t+0.6);
      });
    }

    if(type==='impact'||type==='all'){
      // Heavy percussive impact
      [28,35,48].forEach((f,i)=>{
        const o=this.ctx.createOscillator(); o.type='sine';
        o.frequency.setValueAtTime(f,t);
        o.frequency.exponentialRampToValueAtTime(f*0.4,t+0.25);
        const env=this.ctx.createGain();
        env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.8*vol,t+0.01);
        env.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.connect(env); env.connect(this.master);
        o.start(t); o.stop(t+0.35);
      });
    }
  },

  // Phase transition sting
  phaseSting(from,to){
    if(!this.init||from===0)return;
    const intensity=to>=4?3:to>=3?2:1;
    if(to>=4)this.jumpscare('all',3);
    else if(to>=3)this.jumpscare('stinger',2);
    // Sub drop on any phase transition
    setTimeout(()=>this.jumpscare('subdrop',intensity),150);
  },

  impact(){
    if(!this.init||this.phase<3)return;
    const t=this.ctx.currentTime;
    [28,36,50].forEach(f=>{
      const o=this.ctx.createOscillator(),env=this.ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.5,t+0.02);
      env.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      o.connect(env); env.connect(this.impactGain); this.impactGain.gain.value=0.7;
      o.start(t); o.stop(t+0.5);
    });
    this.impactGain.gain.linearRampToValueAtTime(0,t+0.5);
  },
};

applyPhase(1); render(0);

// Ambient micro-disturbances
setInterval(()=>{if(gp>=3&&Math.random()>0.72){const o=$card.style.opacity;$card.style.opacity='0.96';setTimeout(()=>{$card.style.opacity=o||'1';},60+Math.random()*50);}},10000+Math.random()*10000);
setInterval(()=>{if(gp>=3&&Math.random()>0.65){const rp=Math.round((idx/T)*100),fp=Math.min(99,rp+Math.floor(Math.random()*10+3));$pp.textContent=fp+'%';setTimeout(()=>{$pp.textContent=rp+'%';},1000+Math.random()*1800);}},18000+Math.random()*12000);

// Option hover corruption in phase 3+
document.addEventListener('mouseover',e=>{
  if(gp<3)return;
  const opt=e.target.closest('.option'); if(!opt)return;
  const oi=parseInt(opt.dataset.opt); if(isNaN(oi))return;
  hoverCounts[oi]=(hoverCounts[oi]||0)+1;
  if(hoverCounts[oi]>=4&&Math.random()>0.5){
    const span=opt.querySelector('span:last-child');
    const orig=span.textContent;
    const corruptions=['……','——','你在看什么','别选了','回头看'];
    span.textContent=corruptions[Math.floor(Math.random()*corruptions.length)];
    span.style.color='var(--danger)';
    setTimeout(()=>{span.textContent=orig;span.style.color='';hoverCounts[oi]=0;},600+Math.random()*400);
  }
});

})();
</script>
</body>
</html>
